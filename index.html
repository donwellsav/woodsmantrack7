<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Track Seven" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script>
      // Set theme before paint to avoid a flash of the wrong colors.
      (function () {
        try {
          var t = localStorage.getItem('woodsman-theme-v1');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <title>Woodsman: Track Seven</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- foliate-js: load as native module (registers <foliate-view> custom element) -->
    <script type="module" src="/foliate-js/view.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
